<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .titulo{
            color:darkblue;
            font-size: 15px;
            background-color: lime;
            letter-spacing: 3px;

        }

        .menu{
            display: inline;
            background-color: cadetblue;
            color: beige;
            width: 500px;
            height: 100px;
        }

        .menu_block{
            display: block;
            background-color: cadetblue;
            color: beige;
            width: 500px;
            height: 100px;
        }
    </style>

</head>
<body>
    <h1 class="titulo">ELEMENTOS inline</h1>
    <div class="menu">productos</div>
    <div class="menu">servicio</div>
    <div class="menu">contacto</div>   
    <hr>
    <h1 class="titulo">Elementos block</h1>
     <div class="menu_block">productos</div>
    <div class="menu_block">servicio</div>
    <div class="menu_block">contacto</div>  



</body>
</html>
