<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reto</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


</head>

<body class="bg-white flex items-center justify-center h-screen">

  <div class="relative w-[500px] h-[300px]">
    
    <!-- Línea izquierda -->
    <div class="absolute left-0 top-0 h-full w-2 bg-[rgb(31,77,118)]"></div>

    <!-- Línea superior   -->
    <div class="absolute top-0 left-0 w-full h-1 bg-[rgb(182,148,11)]"></div>
    <div class="absolute top-2 left-0 w-full h-1 bg-[rgb(182,148,11)]"></div>

    <!-- Línea derecha -->
    <div class="absolute right-0 top-0 h-full border-r-6 border-dashed border-[rgb(111,47,157)]"></div>

    <!-- Línea inferior  -->
    <div class="absolute bottom-0 left-0 w-full h-0.5 bg-[rgb(37,170,205)]"></div>



  </div>

</body>
</html>
